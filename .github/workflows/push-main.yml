name: Trigger builds on new commits to main

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  get-comfyui-latest-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Get latest release
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(bash .github/scripts/resolve-comfyui-latest-release.sh)
          echo "Latest ComfyUI release: $tag"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"

  build-comfyui-master:
    concurrency:
      group: build-master
      cancel-in-progress: true
    uses: ./.github/workflows/build-docker.yml
    with:
      comfyui_ref: "master"
      image_label: "master"
      push_images: true
    permissions:
      contents: read
      packages: write
    secrets: inherit

  build-comfyui-latest-release:
    needs: [get-comfyui-latest-release]
    concurrency:
      group: build-latest
      cancel-in-progress: true
    uses: ./.github/workflows/build-docker.yml
    with:
      comfyui_ref: "${{ needs.get-comfyui-latest-release.outputs.tag }}"
      image_label: "latest"
      extra_image_label: "${{ needs.get-comfyui-latest-release.outputs.tag }}"
      push_images: true
    permissions:
      contents: read
      packages: write
    secrets: inherit
