name: Rebuild on ComfyUI latest release changes

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  get-comfyui-latest-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Get latest release
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(bash .github/scripts/resolve-comfyui-latest-release.sh)
          echo "Latest ComfyUI release: $tag"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"

  check-comfyui-latest:
    needs: get-comfyui-latest-release
    uses: ./.github/workflows/check-comfyui.yml
    with:
      comfyui_ref: "${{ needs.get-comfyui-latest-release.outputs.tag }}"
      image_label: "latest"
      extra_image_label: "${{ needs.get-comfyui-latest-release.outputs.tag }}"
    permissions:
      contents: read
      packages: write
    secrets: inherit
