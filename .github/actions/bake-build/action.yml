name: 'Docker Bake Build'
description: 'Reusable composite action to build and optionally push Docker Bake targets with standardized labeling.'
inputs:
  comfyui_ref:
    description: 'ComfyUI branch or tag reference'
    required: true
  image_label:
    description: 'Image label (e.g., latest, master)'
    required: true
  targets:
    description: 'Comma or newline separated list of Bake targets to build'
    required: true
  push:
    description: 'Whether to push (true/false)'
    required: false
    default: 'true'
  registry:
    description: 'Container registry host (e.g., ghcr.io)'
    required: true
    default: 'ghcr.io'
  docker_registry_url:
    description: 'Full registry URL prefix including trailing slash'
    required: true
  extra_set:
    description: 'Additional Bake set lines (optional)'
    required: false
    default: ''
  registry_token:
    description: 'Token/password for authenticating to the container registry'
    required: false
    default: ''
  github_token:
    description: 'Token for authenticated GitHub API requests'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Pre-create BuildKit volume on /mnt
      shell: bash
      run: |
        sudo mkdir -p /mnt/buildkit-state
        sudo docker volume create \
          --driver local \
          --opt type=none \
          --opt device=/mnt/buildkit-state \
          --opt o=bind \
          buildx_buildkit_ci0_state

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        name: ci

    - name: Log in to registry
      if: ${{ inputs.registry_token != '' }}
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.registry_token }}

    - name: Fetch ComfyUI commit SHA
      id: comfyui_ref
      shell: bash
      run: |
        sha=$(bash "${{ github.action_path }}/../../scripts/resolve-comfyui-sha.sh" "${{ inputs.comfyui_ref }}")
        printf 'sha=%s\n' "$sha" >>"$GITHUB_OUTPUT"

    - name: Fetch ComfyUI metadata
      id: comfyui_metadata
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        bash "${{ github.action_path }}/../../scripts/resolve-comfyui-metadata.sh" \
          "${{ inputs.comfyui_ref }}" \
          "${{ steps.comfyui_ref.outputs.sha }}" >>"$GITHUB_OUTPUT"

    - name: Normalize targets list
      id: targets
      shell: bash
      run: |
        echo "input targets: ${{ inputs.targets }}"
        echo "list<<EOF" >> $GITHUB_OUTPUT
        # Split on comma or newline
        echo "${{ inputs.targets }}" | tr ',' '\n' | sed '/^\s*$/d' >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Build (Docker Bake)
      uses: docker/bake-action@v7
      with:
        push: ${{ inputs.push == 'true' }}
        set: |
          *.args.REFRESH_COMFYUI=${{ steps.comfyui_ref.outputs.sha }}
          *.labels.comfyui.ref=${{ inputs.comfyui_ref }}
          *.labels.comfyui.sha=${{ steps.comfyui_ref.outputs.sha }}
          ${{ steps.comfyui_metadata.outputs.bake_set }}
          ${{ inputs.extra_set }}
        targets: ${{ steps.targets.outputs.list }}
